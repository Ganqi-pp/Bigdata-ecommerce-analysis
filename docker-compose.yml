services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy    
    environment:
     # KAFKA_ADVERTISED_HOST_NAME: localhost
     # KAFKA_ADVERTISED_PORT: 9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "test:1:1"
      KAFKA_BROKER_ID: 1
    ports:
      - "9092:9092"
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hive_metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hive
    ports:
      - "3307:3306"
    # command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10   
  hive-server:
    image: apache/hive:4.0.0
    container_name: hive-server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HIVE_METASTORE_DRIVER: com.mysql.cj.jdbc.Driver
      HIVE_METASTORE_JDBC_URL: jdbc:mysql://mysql:3306/hive_metastore?createDatabaseIfNotExist=true&useSSL=false
      HIVE_METASTORE_USER: hive
      HIVE_METASTORE_PASSWORD: hive
      SERVICE_NAME: hiveserver2
    ports:
      - "10000:10000"
      - "10002:10002"
    command: ["/opt/hive/bin/hive", "--service", "hiveserver2"]
   # command: /opt/hive/bin/hive --service hiveserver2

  flink-jobmanager:
    image: flink-kafka:1.18
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
   # volumes:
    #  - ./lib:/opt/flink/lib   # 新增

  flink-taskmanager:
    image: flink-kafka:1.18
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
   # volumes:
    #  - ./lib:/opt/flink/lib   # 新增
